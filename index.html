<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Dla Mamy ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff8fb1,#ffd6e7);
overflow:hidden;
text-align:center;
}

h1{
font-size:60px;
color:white;
text-shadow:0 0 15px rgba(0,0,0,0.3);
position:relative;
z-index:2;
}

p{
color:white;
font-size:22px;
position:relative;
z-index:2;
}

#gift{
font-size:120px;
cursor:pointer;
transition:0.3s;
z-index:2;
}

#gift:hover{
transform:scale(1.2);
}

#message{
display:none;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.heart{
position:absolute;
color:red;
font-size:26px;
animation:fall linear forwards;
z-index:1;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div id="gift" onclick="openGift()">🎁</div>

<div id="message">
<h1>Kocham Cię Mamo ❤️</h1>
<p>Dziękuję za wszystko co dla mnie robisz</p>
</div>

<audio id="song" loop>
<source src="piosenka.mp3" type="audio/mpeg">
</audio>

<script>

function openGift(){

document.getElementById("gift").style.display="none"
document.getElementById("message").style.display="block"

document.getElementById("song").play()

setInterval(createHeart,100)

}

function createHeart(){

const heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*2+1.5)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},4000)

}

</script>

</body>
</html>
